name = "lectures"
main = "worker/index.js"
compatibility_date = "2024-09-01"

[assets]
directory = "./dist"
not_found_handling = "single-page-application"

# Run: npx wrangler secret put ANTHROPIC_API_KEY
# Run: npx wrangler d1 create lectures-db  → paste the id below

[[d1_databases]]
binding = "DB"
database_name = "lectures-db"
database_id = "95cc9156-b106-42ba-8996-e67c85c0301a"

[[routes]]
pattern = "lectures.robertbumanglagjr.com/*"
zone_name = "robertbumanglagjr.com"
